name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # npm trusted publishing (OIDC) + provenance
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npx vitest run
      - name: Check release tag matches package version
        run: |
          version=$(node -p "require('./package.json').version")
          if [ "v${version}" != "${{ github.event.release.tag_name }}" ]; then
            echo "Release tag ${{ github.event.release.tag_name }} does not match package version v${version}"
            exit 1
          fi
      - name: Build
        run: npm run build
      - name: Publish to npm
        run: npm publish --provenance --access public
